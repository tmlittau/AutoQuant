# nginx config for the AutoQuant frontend container.
#
# Serves the built SPA from /usr/share/nginx/html on port 80, and reverse-
# proxies dynamic paths to the backend container (Gunicorn on backend:8000)
# over the compose-internal Docker network. The backend is never bound to the
# TrueNAS host; the only port reachable from outside the compose stack is the
# host port mapped to this nginx (3000 by default).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the HTML shell -- SPA updates must take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Long-cache hashed bundle assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API, admin, and Django-served static assets to the backend.
    # X-Forwarded-Proto tells Django the original client used HTTPS
    # (Cloudflare terminates TLS at the edge) so it sets secure cookies.
    location ~ ^/(api|admin|static)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA fallback -- any other path returns index.html so client-side
    # routing handles it (svelte-spa-router uses hash routes, but this is
    # still required for direct-link / refresh on / paths).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
